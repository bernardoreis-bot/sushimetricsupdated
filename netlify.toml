[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  external_node_modules = [
    "@sparticuz/chromium",
    "chrome-aws-lambda",
    "puppeteer-core",
    "puppeteer-extra",
    "puppeteer-extra-plugin-stealth"
  ]

[build.environment]
  NODE_VERSION = "18"
  # Set these in Netlify > Site settings > Environment variables
  VITE_SUPABASE_URL = "https://izmucqxaithkurzdezbk.supabase.co"
  VITE_SUPABASE_ANON_KEY = "sb_publishable_AnHhK4rYi5qS91DtXjTNuA_PAlBconp"

# SPA fallback to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[scheduled]]
  path = "/.netlify/functions/powerbi-sales-schedule"
  schedule = "0 9,11,18 * * 1-3"
